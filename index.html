<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raspadinha Premiada</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

.container{
width:100%;
max-width:420px;
text-align:center;
}

h1{
color:#ff0000;
font-size:52px;
font-weight:900;
text-shadow:0 0 25px red;
margin-bottom:15px;
}

.subtitle{
color:#ffd7d7;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.card{
position:relative;
background:#111;
border:4px solid #ff0000;
border-radius:28px;
padding:22px;
box-shadow:0 0 35px red;
}

.prize{
height:240px;
border-radius:20px;
background:
linear-gradient(
135deg,
#730000,
#ff0000
);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:15px;
overflow:hidden;

color:white;
text-shadow:2px 2px 4px black;
}

.prize h2{
font-size:22px;
margin-bottom:10px;
}

.prize p{
font-size:30px;
font-weight:900;
line-height:1.2;
max-width:90%;
}

canvas{
position:absolute;
left:22px;
top:22px;
border-radius:20px;
touch-action:none;
z-index:5;
}

.instruction{
margin-top:18px;
font-size:17px;
color:#ffe3e3;
}

/* IMPACTO */

.flash{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
z-index:90;
}

.flash.active{
animation:flash .35s;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:.7;}
100%{opacity:0;}
}

.shake{
animation:shake .4s linear 4;
}

@keyframes shake{

0%{transform:translate(0);}
20%{transform:translate(-8px,5px);}
40%{transform:translate(8px,-5px);}
60%{transform:translate(-6px,-4px);}
80%{transform:translate(6px,4px);}
100%{transform:translate(0);}

}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

.overlay.active{
display:flex;
}

.punch{
font-size:260px;
animation:punch .9s cubic-bezier(.2,1.4,.4,1) forwards;
filter:drop-shadow(0 0 35px red);
}

@keyframes punch{

0%{
transform:
scale(.1)
translateY(400px)
rotate(-30deg);
opacity:0;
}

50%{
transform:
scale(2.6)
translateY(-20px)
rotate(10deg);
opacity:1;
}

100%{
transform:
scale(1.8)
translateY(0)
rotate(0);
}

}

.boom{
position:fixed;
top:18%;
left:50%;
transform:translateX(-50%);
font-size:90px;
font-weight:900;
color:#ff0000;
display:none;
z-index:150;
text-shadow:
0 0 30px red,
0 0 60px red;
}

.boom.active{
display:block;
animation:boom .7s ease-out;
}

@keyframes boom{
from{
transform:
translateX(-50%)
scale(.1);
opacity:0;
}
to{
transform:
translateX(-50%)
scale(1);
opacity:1;
}
}

button{
display:none;
margin-top:25px;

background:#a00000;
color:white;
border:none;

padding:16px 24px;
font-size:18px;
font-weight:bold;

border-radius:16px;
box-shadow:0 0 20px red;
}

button.show{
display:inline-block;
}

</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="boom" id="boom">
TOMA!!!
</div>

<div class="overlay" id="overlay">
<div class="punch">🥊</div>
</div>

<div class="container" id="page">

<h1>RASPADINHA</h1>

<div class="subtitle">
Raspe e descubra seu prêmio misterioso
</div>

<div class="card" id="card">

<div class="prize">

<h2>🎉 PARABÉNS 🎉</h2>

<p>
VOCÊ GANHOU UM SOCO
NA CARA VIRTUAL 🥊
</p>

</div>

<canvas id="scratch"></canvas>

</div>

<div class="instruction">
Passe o dedo na área cinza para raspar
</div>

<button id="again"
onclick="location.reload()">
PROCESSAR INDENIZAÇÃO
</button>

</div>

<script>

const canvas=document.getElementById("scratch");
const ctx=canvas.getContext("2d");

let drawing=false;
let revealed=false;

function setupCanvas(){

const prize=
document.querySelector(".prize");

const rect=
prize.getBoundingClientRect();

canvas.width=rect.width;
canvas.height=rect.height;

ctx.globalCompositeOperation=
"source-over";

ctx.fillStyle="#b7b7b7";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#333";

ctx.textAlign="center";

ctx.font="bold 26px Arial";

ctx.fillText(
"RASPE AQUI",
canvas.width/2,
canvas.height/2-10
);

ctx.font="18px Arial";

ctx.fillText(
"💰 prêmio garantido 💰",
canvas.width/2,
canvas.height/2+25
);

}

window.onload=setupCanvas;

function pos(e){

const r=
canvas.getBoundingClientRect();

return{
x:e.clientX-r.left,
y:e.clientY-r.top
};

}

function start(e){

drawing=true;
scratch(e);

}

function stop(){

drawing=false;

}

function scratch(e){

if(!drawing || revealed)
return;

e.preventDefault();

const p=pos(e);

ctx.globalCompositeOperation=
"destination-out";

ctx.beginPath();

ctx.arc(
p.x,
p.y,
35,
0,
Math.PI*2
);

ctx.fill();

checkReveal();

}

function checkReveal(){

const img=
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

let clear=0;

for(let i=3;i<img.data.length;i+=4){

if(img.data[i]===0)
clear++;

}

const percent=
clear/(img.data.length/4);

if(percent>.35){

reveal();

}

}

function reveal(){

revealed=true;

canvas.style.display="none";

if(navigator.vibrate){

navigator.vibrate([
200,
100,
200,
100,
500
]);

}

document
.getElementById("page")
.classList.add("shake");

document
.getElementById("overlay")
.classList.add("active");

document
.getElementById("boom")
.classList.add("active");

document
.getElementById("flash")
.classList.add("active");

document
.getElementById("again")
.classList.add("show");

setTimeout(()=>{

document
.getElementById("overlay")
.classList.remove("active");

},1200);

}

canvas.addEventListener(
"pointerdown",
start
);

canvas.addEventListener(
"pointermove",
scratch
);

canvas.addEventListener(
"pointerup",
stop
);

canvas.addEventListener(
"pointerleave",
stop
);

</script>

</body>
</html>
